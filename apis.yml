name: Bankwest
kind: company
description: Bankwest is an Australian retail and business bank headquartered in Perth,
  Western Australia. Founded in 1895 as the Agricultural Bank of Western Australia and
  later the Bank of Western Australia, it has operated as a wholly owned subsidiary of
  Commonwealth Bank of Australia (CBA) since CBA's December 2008 acquisition. In March
  2024 Bankwest announced it would close its remaining branch network and become a
  digital-only bank, retaining the Bankwest brand for personal and business customers
  nationally. As an authorised deposit-taking institution brand operating under Australia's
  Consumer Data Right (CDR / Open Banking) regime, Bankwest exposes a public,
  unauthenticated Product Reference Data (PRD) API conforming to the Data Standards Body
  Consumer Data Standards; consumer data sharing beyond PRD requires ACCC accreditation
  and customer consent under the CDR authorisation model.
