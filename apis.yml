  baseURL: https://open-api.bankwest.com.au/bwpublic/cds-au/v1/banking/products
  properties:
  - url: https://www.bankwest.com.au/support/open-banking/developers
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_get-products
    type: APIReference
  - url: openapi/bankwest-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Public, unauthenticated Product Reference Data (PRD) API returning the
    features, rates, fees and eligibility for Bankwest's publicly offered banking products
    (transaction and savings accounts, term deposits, credit cards, personal loans and
    home loans). Confirmed live at HTTP 200 with x-v 5 returning 19 products. Conforms to
    the DSB Consumer Data Standards CDS-AU/v1 banking schema; GET /banking/products and
    GET /banking/products/{productId} require the x-v version header (v4 and v5 supported).
